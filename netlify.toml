[build]
  publish = "."

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[dev]
  publish = "."
  port = 8888
  framework = "#static"
  autoLaunch = false

# CDN de imagens (aceita qualquer URL externa)
[images]
  remote_images = ["https://.*"]

# Raiz serve a LP principal (rewrite, sem redirect HTTP - economiza ~1s no LCP)
[[redirects]]
  from = "/"
  to = "/lp-suporte-alunos/index.html"
  status = 200
  force = true

# LP Operacao (rewrite tambem - sem redirect HTTP)
[[redirects]]
  from = "/operacao"
  to = "/lp-operacao/index.html"
  status = 200
  force = true

[[redirects]]
  from = "/operacao/"
  to = "/lp-operacao/index.html"
  status = 200
  force = true

# Proposta personalizada Celso (corrida de rua)
[[redirects]]
  from = "/celso-corrida"
  to = "/lp-proposta/index.html"
  status = 200
  force = true

[[redirects]]
  from = "/celso-corrida/"
  to = "/lp-proposta/index.html"
  status = 200
  force = true

# Headers de seguranca
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache para assets estaticos
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
